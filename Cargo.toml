[package]
name = "infinity-agents-leader"
version = "0.1.0"
edition = "2024"

[dependencies]
aws_lambda_events = { version = "1.0.0", default-features = false, features = ["sqs"] }

lambda_runtime = "1.0.1"
tokio = { version = "1", features = ["macros"] }

futures-util = "0.3"
rig-core = { version = "0.24", default-features = false }
rig-bedrock = "0.3"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
aws-sdk-dynamodb = "1"
aws-sdk-sqs = "1"
aws-sdk-ssm = "1"
aws-sdk-scheduler = "1"
aws-sdk-dsql = "1"
aws-config = "1"
aws-types = "1"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "json", "chrono", "uuid"] }
chrono = "0.4"
chrono-tz = "0.10"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
